name: Run Tests
on: [push, pull_request]
jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: cd server && pip install -r requirements.txt -r requirements-dev.txt
      - run: cd server && pytest tests/ -v --tb=short --cov=src --cov-report=term
  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18" }
      - run: cd web && npm ci && npm run build && npm test -- --passWithNoTests
---
name: Deploy to Vercel
on:
  push:
    branches: [main]
    paths:    ["web/**"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18" }
      - run: cd web && npm ci && npm run build
      - run: cd web && npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
